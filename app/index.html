<!DOCTYPE HTML>
<html>

<head>
    <title> Project Preview </title>
    <script src="https://ui5.sap.com/1.136.9/resources/sap-ui-core.js" 
            id="sap-ui-bootstrap"
            data-sap-ui-theme="sap_horizon"
            data-sap-ui-bindingSyntax="complex" 
            data-sap-ui-xx-bindingSyntax="complex"
            data-sap-ui-resourceroots='{"assets": "assets"}' 
            data-sap-ui-libs="sap.m,sap.uxap,sap.ui.layout,sap.f">
    </script>
    <link rel="stylesheet" href="assets/preview.css">
</head>

<body id="body" class="sapUiBody">
    <script>
        "use strict";
        sap.ui.localResources("assets");
        (function (jQuery, App, Page) {
            sap.ui.getCore().attachInit(function () {
                sap.ui.define([
                    "sap/ui/core/mvc/Controller",
                    "sap/ui/model/json/JSONModel"
                ], function (Controller, JSONModel) {
                    return Controller.extend("PreviewController", {
                        onInit: function () {

                            const data = {"Services":[{"ServiceName":"cAPM1Srv","DetailsURL":"./service/cAPM1/","Metadata":"./service/cAPM1/$metadata","Entities":[{"Name":"Store","URL":"./service/cAPM1/Store","FioriURL":"$fiori-preview/cAPM1Srv/Store#preview-app"},{"Name":"OpeningHours","URL":"./service/cAPM1/OpeningHours","FioriURL":"$fiori-preview/cAPM1Srv/OpeningHours#preview-app"},{"Name":"Products","URL":"./service/cAPM1/Products","FioriURL":"$fiori-preview/cAPM1Srv/Products#preview-app"},{"Name":"PriceDetails","URL":"./service/cAPM1/PriceDetails","FioriURL":"$fiori-preview/cAPM1Srv/PriceDetails#preview-app"},{"Name":"Festivals","URL":"./service/cAPM1/Festivals","FioriURL":"$fiori-preview/cAPM1Srv/Festivals#preview-app"},{"Name":"ProductCatalog","URL":"./service/cAPM1/ProductCatalog","FioriURL":"$fiori-preview/cAPM1Srv/ProductCatalog#preview-app"}],"EntitiesCount":6}]}
                            this.getView().setModel(new JSONModel(data));
                        }
                    });
                });
                var oApp = new App()
                var previewView = sap.ui.view({
                    viewName: "assets.Preview",
                    type: sap.ui.core.mvc.ViewType.XML
                });
                oApp.addPage(new Page({
                    content: [previewView],
                    showHeader: false
                })).placeAt("content");
            });

        }(jQuery, sap.m.App, sap.m.Page));
    </script>
    <div id="content"></div>
</body>

</html>
